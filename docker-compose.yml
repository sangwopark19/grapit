services:
  postgres:
    image: postgres:16-alpine
    container_name: grapit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: grapit
      POSTGRES_USER: grapit
      POSTGRES_PASSWORD: grapit_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grapit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
