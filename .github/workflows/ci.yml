name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    # Postgres service container for E2E runs (Phase 09-tech-debt DEBT-05).
    # Unit tests (pnpm test) do not hit the DB — they mock it — but migrate/seed
    # + Playwright E2E do, and the API server launched by Playwright webServer
    # expects DATABASE_URL to resolve.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grapit_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # Wired at job level so migrate/seed/api-dev-server all resolve identically.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grapit_test
      # Test-only secrets — never use in production. NestJS main.ts only hard-fails
      # FRONTEND_URL https when NODE_ENV=production, so NODE_ENV=test keeps CORS
      # origin as http://localhost:3000 for Playwright.
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-not-for-production-usage-only
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-not-for-production-usage-only
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # DB readiness + schema + seed data for E2E runs.
      # drizzle-kit migrate reads DATABASE_URL from env (CLAUDE.md convention:
      # DOTENV_CONFIG_PATH only needed when .env is the source; CI injects via env).
      - name: Run DB migrations
        run: pnpm --filter @grapit/api exec drizzle-kit migrate

      - name: Seed test data (admin@grapit.test)
        run: pnpm --filter @grapit/api run seed

      - name: Verify seed — admin user present in DB (debug aid)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d grapit_test -c \
            "SELECT email, role, is_email_verified, is_phone_verified, length(password_hash) AS pw_len FROM users WHERE email='admin@grapit.test';"

      # REVIEWS.md HIGH-02: Hard-gate on non-fork events.
      # main push / schedule / workflow_dispatch / same-repo PR MUST have Toss test secrets.
      # Fork PRs: skip gracefully (GitHub Actions strips secrets for forks automatically).
      - name: Verify Toss test secrets present (hard-gate on non-fork events)
        if: |
          github.event_name == 'push' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        env:
          TOSS_CLIENT_KEY_TEST: ${{ secrets.TOSS_CLIENT_KEY_TEST }}
          TOSS_SECRET_KEY_TEST: ${{ secrets.TOSS_SECRET_KEY_TEST }}
        run: |
          if [ -z "$TOSS_CLIENT_KEY_TEST" ] || [ -z "$TOSS_SECRET_KEY_TEST" ]; then
            echo "Missing TOSS_CLIENT_KEY_TEST or TOSS_SECRET_KEY_TEST in repo secrets."
            echo "Register via: gh secret set TOSS_CLIENT_KEY_TEST"
            echo "See .planning/phases/09-tech-debt/09-CONTEXT.md D-13 for rationale."
            exit 1
          fi
          echo "Toss test secrets present."

      - name: Install Playwright browsers
        run: pnpm --filter @grapit/web exec playwright install --with-deps chromium

      # Build the API (nest build → dist/main.js) so startup is fast + deterministic.
      # `nest start --watch` (the dev script) takes too long in CI due to TSC init
      # and didn't finish listening within 60s in the previous run.
      - name: Build API
        run: pnpm --filter @grapit/api build

      # API server in background — separate step (not Playwright webServer) so
      # logs land in api.log for post-mortem + env propagation is trivial.
      # Readiness check: any HTTP response from /api/v1/health means Nest is
      # listening. We accept 200 AND 5xx because the RedisHealthIndicator
      # returns 503 when falling back to InMemoryRedis (CI has no Redis),
      # but the API process itself is fully bootstrapped at that point.
      # HTTP code "000" = connection refused = API not up yet.
      - name: Record runtime versions (Phase 09.1 diagnostic)
        run: |
          echo "node: $(node -v)"
          echo "pnpm: $(pnpm -v)"
          echo "os: $(uname -a)"

      - name: Start API server (background)
        env:
          # Phase 09.1 diagnostic — CI-only, removed in plan 05.
          DEBUG_AUTH_REQ: "1"
        run: |
          # Detach fully so GitHub Actions runner doesn't SIGHUP the process when
          # this step ends: nohup (ignore SIGHUP) + < /dev/null (detach stdin) +
          # setsid (new process group) + disown (remove from shell job table).
          # Without this, the API dies between steps even though `&` seems to work.
          setsid nohup node apps/api/dist/main.js > api.log 2>&1 < /dev/null &
          API_PID=$!
          echo $API_PID > api.pid
          disown || true
          echo "API started with PID $API_PID, waiting for HTTP response on :8080..."
          for i in $(seq 1 60); do
            # curl -w "%{http_code}" prints "000" on connection refused and the
            # exit code is non-zero. Use `|| true` to avoid set -e abort, but
            # DO NOT chain another echo "000" — that would duplicate the token.
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/health 2>/dev/null || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "API ready after ${i} attempts (~${i}s) — HTTP $code"
              exit 0
            fi
            sleep 1
          done
          echo "API did not respond on port 8080 within 60s. Full api.log:"
          cat api.log
          exit 1

      - name: Smoke test login (debug aid)
        run: |
          echo "--- POST /api/v1/auth/login ---"
          curl -sS -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@grapit.test","password":"TestAdmin2026!"}' \
            -w "\nHTTP %{http_code}\n" || true

      - name: Dump AUTH_LOGIN_DEBUG after curl baseline (Phase 09.1 diagnostic)
        if: always()
        run: |
          echo "=== AUTH_LOGIN_DEBUG entries (expected: 1 after curl) ==="
          grep AUTH_LOGIN_DEBUG api.log || echo "(none yet — expected at least 1 from curl)"

      - name: E2E diagnostic probe (Phase 09.1 — observe server-side AUTH_LOGIN_DEBUG)
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          pnpm --filter @grapit/web exec playwright test e2e/diagnostic/auth-login-probe.spec.ts --reporter=list || true
          echo "=== AUTH_LOGIN_DEBUG entries after probe (expected: 2 = curl + playwright) ==="
          grep AUTH_LOGIN_DEBUG api.log | wc -l
          echo "=== curl baseline (1st) ==="
          grep AUTH_LOGIN_DEBUG api.log | sed -n '1p'
          echo "=== Playwright probe (2nd) ==="
          grep AUTH_LOGIN_DEBUG api.log | sed -n '2p'

      - name: E2E tests (Toss Payments)
        env:
          TOSS_CLIENT_KEY_TEST: ${{ secrets.TOSS_CLIENT_KEY_TEST }}
          TOSS_SECRET_KEY_TEST: ${{ secrets.TOSS_SECRET_KEY_TEST }}
          NEXT_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.TOSS_CLIENT_KEY_TEST }}
          # Blocker B2: propagate CI test user credentials (auth helper falls back
          # to seed.mjs defaults when unset, which matches local developer flow).
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: pnpm --filter @grapit/web test:e2e

      - name: Dump API log (on failure)
        if: failure()
        run: |
          echo "=== api.log (last 200 lines) ==="
          tail -n 200 api.log || echo "api.log not found"

      - name: Stop API server
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" 2>/dev/null || true
          fi
