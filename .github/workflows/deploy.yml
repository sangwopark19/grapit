name: Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast3
  AR_REPO: grapit
  WEB_SERVICE: grapit-web
  API_SERVICE: grapit-api

jobs:
  deploy-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # DB migration (per D-17)
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @grapit/api exec drizzle-kit migrate

      # GCP Auth (OIDC, per D-20)
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Build & Push API image
      - name: Build API image
        run: |
          docker build -f apps/api/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }} \
            .
      - name: Push API image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}

      # Deploy to Cloud Run (per D-16, D-18)
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}
          flags: >-
            --service-account=grapit-cloudrun@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
            --min-instances=0
            --max-instances=5
            --memory=512Mi
            --cpu=1
            --port=8080
            --no-cpu-throttling
            --session-affinity
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=database-url:latest
            JWT_SECRET=jwt-secret:latest
            JWT_REFRESH_SECRET=jwt-refresh-secret:latest

  deploy-web:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # GCP Auth
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Build & Push Web image
      - name: Build Web image
        run: |
          docker build -f apps/web/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }} \
            .
      - name: Push Web image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}

      # Deploy to Cloud Run (per D-16, D-18)
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.WEB_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}
          flags: >-
            --service-account=grapit-cloudrun@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --port=3000
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
