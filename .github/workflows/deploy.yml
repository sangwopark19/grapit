name: Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast3
  AR_REPO: grabit
  WEB_SERVICE: grabit-web
  API_SERVICE: grabit-api

jobs:
  deploy-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # GCP Auth (OIDC, per D-20) — must run before migration for Cloud SQL Proxy
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Cloud SQL Auth Proxy for CI migration
      # WR-05: sleep 3 대신 5432 포트가 accept 상태가 될 때까지 최대 30초 retry.
      #        runner 부하/네트워크 지연 시 migration 단계 race 를 차단한다.
      - name: Start Cloud SQL Auth Proxy
        run: |
          gcloud components install cloud-sql-proxy --quiet 2>/dev/null || true
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} --port=5432 &
          for i in $(seq 1 30); do
            if nc -z localhost 5432; then
              echo "Cloud SQL Proxy ready after ${i}s."
              exit 0
            fi
            sleep 1
          done
          echo "Cloud SQL Proxy failed to accept connections within 30s" >&2
          exit 1

      # DB migration (per D-17)
      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @grabit/api exec drizzle-kit migrate

      # Build & Push API image
      - name: Build API image
        run: |
          docker build -f apps/api/Dockerfile \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }} \
            .
      - name: Push API image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}

      # Deploy to Cloud Run (per D-16, D-18)
      # D-05: --service-account 값은 grapit-cloudrun@ 그대로 유지 (Phase 13 rename 제외 — IAM 바인딩 재설정 리스크 회피)
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.API_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}
          flags: >-
            --service-account=grapit-cloudrun@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
            --min-instances=0
            --max-instances=5
            --memory=512Mi
            --cpu=1
            --port=8080
            --no-cpu-throttling
            --session-affinity
            --allow-unauthenticated
            --network=default
            --subnet=default
            --vpc-egress=private-ranges-only
          # WR-05: Cloud Run URL 은 GitHub environment variables (CLOUD_RUN_WEB_URL,
          # CLOUD_RUN_API_URL) 로 주입한다. 이전에는 특정 인스턴스 해시가 yml 에 박혀 있어
          # 프로젝트/리전 이전 시 전역 치환이 필요했다.
          env_vars: |
            NODE_ENV=production
            FRONTEND_URL=${{ vars.CLOUD_RUN_WEB_URL }}
            KAKAO_CALLBACK_URL=${{ vars.CLOUD_RUN_API_URL }}/api/v1/auth/social/kakao/callback
            NAVER_CALLBACK_URL=${{ vars.CLOUD_RUN_API_URL }}/api/v1/auth/social/naver/callback
            GOOGLE_CALLBACK_URL=${{ vars.CLOUD_RUN_API_URL }}/api/v1/auth/social/google/callback
          secrets: |
            DATABASE_URL=database-url:latest
            JWT_SECRET=jwt-secret:latest
            JWT_REFRESH_SECRET=jwt-refresh-secret:latest
            KAKAO_CLIENT_ID=kakao-client-id:latest
            KAKAO_CLIENT_SECRET=kakao-client-secret:latest
            NAVER_CLIENT_ID=naver-client-id:latest
            NAVER_CLIENT_SECRET=naver-client-secret:latest
            GOOGLE_CLIENT_ID=google-client-id:latest
            GOOGLE_CLIENT_SECRET=google-client-secret:latest
            REDIS_URL=redis-url:latest
            R2_ACCOUNT_ID=r2-account-id:latest
            R2_BUCKET_NAME=r2-bucket-name:latest
            R2_PUBLIC_URL=r2-public-url:latest
            R2_ACCESS_KEY_ID=r2-access-key-id:latest
            R2_SECRET_ACCESS_KEY=r2-secret-access-key:latest
            RESEND_API_KEY=resend-api-key:latest
            RESEND_FROM_EMAIL=resend-from-email:latest
            INFOBIP_API_KEY=infobip-api-key:latest
            INFOBIP_BASE_URL=infobip-base-url:latest
            INFOBIP_SENDER=infobip-sender:latest
            SENTRY_DSN=sentry-dsn:latest
            TOSS_SECRET_KEY=toss-secret-key:latest

  deploy-web:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # GCP Auth
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Build & Push Web image
      # WR-05: API/WS URL 은 vars.CLOUD_RUN_API_URL 로 통일 (이전: 하드코딩).
      - name: Build Web image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.CLOUD_RUN_API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.CLOUD_RUN_API_URL }} \
            --build-arg NEXT_PUBLIC_R2_HOSTNAME=${{ secrets.R2_PUBLIC_HOSTNAME }} \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }} \
            --build-arg NEXT_PUBLIC_TOSS_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }} \
            .
      - name: Push Web image
        run: docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}

      # Deploy to Cloud Run (per D-16, D-18)
      # D-05: --service-account 값은 grapit-cloudrun@ 그대로 유지 (Phase 13 rename 제외 — IAM 바인딩 재설정 리스크 회피)
      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.WEB_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}
          flags: >-
            --service-account=grapit-cloudrun@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --port=3000
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
          secrets: |
            SENTRY_DSN=sentry-dsn-web:latest
